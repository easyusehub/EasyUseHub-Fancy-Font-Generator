    ];

    const minimalDecors = ["★", "☆", "✦", "✧", "💠", "🛡", "⚔", "🔱", "⚜", "⚓", "⛩", "⚖", "💎", "🧿", "░", "彡", "【", "】", "『", "』", "╰☆", "☆╮"];

    window.onload = () => setTimeout(() => document.getElementById('push-ad').classList.add('active'), 4000);

    function gen() {
        const v = document.getElementById('userInput').value;
        const res = document.getElementById('results');
        if(!v) { res.innerHTML = ""; return; }
        let h = "";
        const norm = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        // 1. Core Language Agnostic Font Styles (maps) -> 60+ genuine styles for A-Z
        if(/[a-zA-Z]/.test(v)) {
            genuineMaps.forEach(m => {
                let s = ""; for(let c of v) { let i = norm.indexOf(c); s += i > -1 ? (m.a+m.A+m.n)[i] : c; }
                h += item(s);
            });
        }

        // 2. Global Professional Decorations (Supports All Languages)
        // Wraps input in elegant markers -> 20+ styles
        minimalDecors.forEach(d => {
            h += item(d + " " + v + " " + d);
        });

        // 3. Mathematical Combinations (Genuine Maps + Minimal Decor)
        // Mixes 5 maps with 4 decors to ensure 100+ unique, high-quality combinations
        if(/[a-zA-Z]/.test(v)) {
            genuineMaps.slice(0, 5).forEach(m => {
                minimalDecors.slice(0, 4).forEach(d => {
                    let s = ""; for(let c of v) { let i = norm.indexOf(c); s += i > -1 ? (m.a+m.A+m.n)[i] : c; }
                    h += item(d + " " + s + " " + d);
                });
            });
        }

        res.innerHTML = h;
    }

    function item(t) { return `<div class="style-item"><div class="style-val">${t}</div><button class="btn-copy" onclick="cp(this, '${t}')">COPY</button></div>`; }
    function cp(b, t) { navigator.clipboard.writeText(t); b.innerText = "DONE"; b.classList.add('success'); setTimeout(() => { b.innerText = "COPY"; b.classList.remove('success'); }, 1000); }
</script>
</body>
</html>
